# Ce fichier est inclus dans le bloc 'http' principal de Nginx.
# Par conséquent, les directives 'worker_processes', 'events { ... }'
# et 'http { ... }' ne doivent PAS être présentes ici.
# Les directives 'limit_req_zone' sont également des directives de contexte 'http'
# et ne doivent pas être définies dans un fichier inclus dans un autre bloc 'http'.

# Définit le service backend (Flask)
upstream analylit_backend {
    server web:5001;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 100M;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # API routes (sans rate limiting pour simplifier la configuration en dev)
    location /api {
        # limit_req zone=api burst=20 nodelay; # Supprimé pour éviter les erreurs de zone non définie
        
        proxy_pass http://analylit_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Upload routes (sans rate limiting pour simplifier la configuration en dev)
    location /api/projects/*/upload-pdf {
        # limit_req zone=upload burst=5 nodelay; # Supprimé pour éviter les erreurs de zone non définie
        
        proxy_pass http://analylit_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        client_max_body_size 50M;
        proxy_request_buffering off;
    }

    # WebSocket pour les mises à jour en temps réel
	location /socket.io {
		proxy_pass http://analylit_backend;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		# WebSocket timeouts
		proxy_read_timeout 86400;
		proxy_send_timeout 86400;
	}

    # Fichiers statiques avec cache
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Cache pour les assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, no-transform";
            add_header Vary "Accept-Encoding";
        }
        
        # Pas de cache pour index.html
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
