# docker-compose-local.yml
services:
  
  base_image_builder:
    build:
      context: .
      dockerfile: Dockerfile.base
    image: analylit-base:latest
  
  # --- NGINX : Reverse Proxy & Serveur de fichiers statiques ---
  nginx:
    image: nginx:1.25.3-alpine
    container_name: analylit-nginx-v4
    ports:
      - "8080:80"  # Expose le port 8080 de l'hôte au port 80 du conteneur Nginx
    volumes:
      - ./nginx_complete.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/usr/share/nginx/html:ro
    networks:
      - analylit-network
    depends_on:
      - web # Nginx dépend du service web pour pouvoir le proxifier
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 0.25g # Très peu de mémoire pour Nginx, car il est très efficace
          cpus: '0.5'   # Nginx est très efficace, 0.5 CPU est suffisant

  # --- SERVEUR WEB PRINCIPAL (Flask avec Gunicorn/Gevent) ---
  web:
    # Utilise l'image construite par base_image_builder
    build:
      context: .
      dockerfile: Dockerfile-web-complete # Utilise le Dockerfile modifié
    networks:
      - analylit-network
    environment:
      # Variables d'environnement pour Flask et les services internes
      - SECRET_KEY=${SECRET_KEY:-8cfb18e58a85676a34a6658a0263b48b85c74799edb807f38}
      - FLASK_ENV=${FLASK_ENV:-development}
      - FLASK_DEBUG=true
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - DATABASE_URL=sqlite:///app/projects/database.db
      - ANALYLIT_VERSION=4.0.0
      - UNPAYWALL_EMAIL=${UNPAYWALL_EMAIL:-alicechabaux@gmail.com}
      - ZOTERO_USER_ID=${ZOTERO_USER_ID:-8926142}
      - ZOTERO_API_KEY=${ZOTERO_API_KEY:-NaqpuvV9xxfJArJRWgYMDlYs}
      - PYTHONPATH=/app
      - USE_GPU=true
      - NVIDIA_VISIBLE_DEVICES=0
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      # Montage des dossiers pour la persistance des données et l'accès au code source
      - ./projects:/app/projects
      - ./web:/app/web:ro
      - .:/app # Monte le répertoire courant pour que les fichiers Python soient accessibles
    # Utilisation de Gunicorn avec GeventWebSocketWorker pour les WebSockets
    command: gunicorn --bind 0.0.0.0:5001 --worker-class geventwebsocket.gunicorn.workers.GeventWebSocketWorker --workers 2 --timeout 120 server_v4_complete:app
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    runtime: nvidia # Active le support GPU NVIDIA pour ce conteneur
    deploy:
      resources:
        limits:
          memory: 2g # Limite de mémoire pour le service web
          cpus: '1.0' # Limite de CPU pour le service web
        reservations:
          devices:
            - driver: nvidia
              count: 1 # Réserve 1 GPU (le même que Ollama et worker)
              capabilities: [gpu]

  # --- WORKER POUR TÂCHES DE FOND (RQ) ---
  worker:
    # Utilise l'image construite par base_image_builder
    build:
      context: .
      dockerfile: Dockerfile-worker-complete # Utilise le Dockerfile modifié
    environment:
      # Variables d'environnement pour le worker
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - DATABASE_URL=sqlite:///app/projects/database.db
      - USE_GPU=true
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=0
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      # Montage des dossiers pour la persistance des données et l'accès au code source
      - ./projects:/app/projects
      - .:/app
    command: python -m rq.cli worker -u redis://redis:6379/0 --with-scheduler analylit_processing_v4 analylit_synthesis_v4 analylit_analysis_v4 analylit_background_v4
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - analylit-network
    restart: unless-stopped
    runtime: nvidia # Active le support GPU NVIDIA pour ce conteneur
    deploy:
      resources:
        limits:
          memory: 2g # Limite de mémoire pour le worker
          cpus: '2.0' # Limite de CPU pour le worker
        reservations:
          devices:
            - driver: nvidia
              count: 1 # Réserve 1 GPU (le même que Ollama et web)
              capabilities: [gpu]

  # --- OLLAMA AVEC SUPPORT GPU NVIDIA ---
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434" # Expose le port Ollama
    volumes:
      - ollama_data:/root/.ollama # Volume pour la persistance des modèles Ollama
    networks:
      - analylit-network
    restart: unless-stopped
    runtime: nvidia # Active le support GPU NVIDIA pour Ollama
    environment:
      # Variables d'environnement spécifiques à Ollama
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        limits:
          memory: 6g # Limite de mémoire pour Ollama (peut être gourmand)
          cpus: '4.0' # Limite de CPU pour Ollama
        reservations:
          devices:
            - driver: nvidia
              count: all # Utilise tous les GPU disponibles (votre RTX 2060 SUPER)
              capabilities: [gpu]

  # --- REDIS POUR CACHE ET QUEUES ---
  redis:
    image: redis:7-alpine
    container_name: analylit-redis-v4
    ports:
      - "6379:6379" # Expose le port Redis
    volumes:
      - redis_data:/data # Volume pour la persistance des données Redis
    networks:
      - analylit-network
    restart: unless-stopped
    command: > # Commande de démarrage de Redis avec configuration optimisée
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 300
      --save 60 1000
    healthcheck: # Vérification de l'état de santé de Redis
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 0.5g # Limite de mémoire pour Redis
          cpus: '0.5'  # Limite de CPU pour Redis

networks:
  analylit-network:
    driver: bridge

volumes:
  redis_data: # Définition du volume pour Redis
    driver: local
  ollama_data: # Définition du volume pour Ollama
    driver: local

  
