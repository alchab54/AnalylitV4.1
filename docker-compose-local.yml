# docker-compose-local.yml
# Optimisé pour Windows + WSL2 + RTX 2060 SUPER + Ryzen 7 + 16GB RAM

services:
  # --- SERVEUR WEB PRINCIPAL ---
  web:
    build:
      context: .
      dockerfile: Dockerfile-web-complete
    ports:
      - "5001:5001"
    networks:
      - analylit-network
    environment:
      - SECRET_KEY=${SECRET_KEY:-8cfb18e58a85676a34a6658a0263b48b85c7479edb807f38}
      - FLASK_ENV=${FLASK_ENV:-development}
      - FLASK_DEBUG=true
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - DATABASE_URL=sqlite:///app/projects/database.db
      - ANALYLIT_VERSION=4.0.0
      - UNPAYWALL_EMAIL=${UNPAYWALL_EMAIL:-alicechabaux@gmail.com}
      - ZOTERO_USER_ID=${ZOTERO_USER_ID:-8926142}
      - ZOTERO_API_KEY=${ZOTERO_API_KEY:-NaqpuvV9xxfJArJRWgYMDlYs}
    volumes:
      - ./projects:/app/projects
      - ./web:/app/web:ro
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    command: >
      sh -c "
      echo '🚀 Démarrage AnalyLit V4.0...' &&
      pip install -r requirements.txt &&
      python -c 'from server_v4_complete import init_db; init_db()' &&
      python server_v4_complete.py
      "
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '3.0'
        reservations:
          memory: 2g
          cpus: '1.5'

  # --- WORKER POUR TÂCHES DE FOND ---
  worker:
    build:
      context: .
      dockerfile: Dockerfile-worker-complete
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - DATABASE_URL=sqlite:///app/projects/database.db
      - USE_GPU=true
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ./projects:/app/projects
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - analylit-network
    restart: unless-stopped
    command: >
      sh -c "
      echo '🔧 Démarrage Worker AnalyLit...' &&
      pip install -r requirements.txt &&
      python -m rq worker -u redis://redis:6379/0 --with-scheduler
        analylit_processing_v4
        analylit_synthesis_v4
        analylit_analysis_v4
        analylit_background_v4
      "
    deploy:
      resources:
        limits:
          memory: 3g
          cpus: '2.0'
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # --- OLLAMA AVEC SUPPORT GPU NVIDIA ---
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - analylit-network
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: '4.0'
        reservations:
          memory: 4g
          cpus: '2.0'
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # --- REDIS POUR CACHE ET QUEUES ---
  redis:
    image: redis:7-alpine
    container_name: analylit-redis-v4
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - analylit-network
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 300
      --save 60 1000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'

networks:
  analylit-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  ollama_data:
    driver: local
