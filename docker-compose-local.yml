# =================================================================
# AnalyLit V4.1 - Docker Compose (Finalisé pour PostgreSQL)
# =================================================================
version: '3.8'

services:
  # --- 1. Base de données PostgreSQL ---
  db:
    image: postgres:15-alpine
    container_name: analylit-db-v4
    volumes:
      - postgres_data_v4:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-analylit_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-strong_password}
      - POSTGRES_DB=${POSTGRES_DB:-analylit_db}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - analylit-network

  # --- 2. Serveur Web (Flask + Gunicorn + SocketIO) ---
  web:
    build:
      context: .
      dockerfile: Dockerfile-web-complete
    container_name: analylit-web-v4
    volumes:
      - ./projects:/app/projects
      - .:/app  # Montage du code source pour le développement (hot-reload)
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - SECRET_KEY=${SECRET_KEY}
      - ANALYLIT_VERSION=${ANALYLIT_VERSION:-4.1.0}
      - PYTHONPATH=/app
    command: >
      sh -c "echo 'En attente de la base de données...' && sleep 5 && 
             echo 'Initialisation de la base de données...' && python -c 'from server_v4_complete import init_db; init_db()' && 
             echo 'Lancement du serveur Gunicorn...' &&
             gunicorn --worker-class geventwebsocket.gunicorn.workers.GeventWebSocketWorker 
                      --workers 1 --bind 0.0.0.0:5001 server_v4_complete:app"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - analylit-network

  # --- 3. Workers Asynchrones (RQ) ---
  worker:
    build:
      context: .
      dockerfile: Dockerfile-worker-complete
    volumes:
      - ./projects:/app/projects
      - .:/app # Montage du code source
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - SECRET_KEY=${SECRET_KEY}
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - ZOTERO_API_KEY=${ZOTERO_API_KEY}
    command: >
      python -m rq.cli worker -u redis://redis:6379/0 --with-scheduler
             analylit_processing_v4 analylit_synthesis_v4
             analylit_analysis_v4 analylit_background_v4
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 3
    networks:
      - analylit-network

  # --- 4. Service IA (Ollama) ---
  ollama:
    image: ollama/ollama:latest
    container_name: analylit-ollama-v4
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ollama_data_v4:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - analylit-network

  # --- 5. Cache & File d'attente (Redis) ---
  redis:
    image: redis:7-alpine
    container_name: analylit-redis-v4
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - analylit-network

  # --- 6. Reverse Proxy & Serveur Statique (Nginx) ---
  nginx:
    image: nginx:1.25-alpine
    container_name: analylit-nginx-v4
    ports:
      - "8080:80"
    volumes:
      - ./nginx_complete.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - analylit-network

volumes:
  postgres_data_v4:
  ollama_data_v4:

networks:
  analylit-network:
    driver: bridge

