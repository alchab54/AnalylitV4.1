# docker-compose-local.yml
services:
  # --- NGINX : Reverse Proxy & Serveur de fichiers statiques ---
  nginx:
    image: nginx:1.25.3-alpine
    container_name: analylit-nginx-v4
    ports:
      - "8080:80"  # Expose le port  8080
    volumes:
      - ./nginx_complete.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/usr/share/nginx/html:ro
    networks:
      - analylit-network
    depends_on:
      - web
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 0.25g # Très peu de mémoire pour Nginx
          cpus: '0.5'   # Nginx est très efficace, 0.5 CPU est suffisant

  # --- SERVEUR WEB PRINCIPAL (Flask avec Gunicorn/Gevent) ---
  web:
    build:
      context: .
      dockerfile: Dockerfile-web-complete
    # Le port 5001 n'est plus exposé directement à l'hôte, Nginx s'en charge
    # ports:
    #   - "5001:5001"
    networks:
      - analylit-network
    environment:
      - SECRET_KEY=${SECRET_KEY:-8cfb18e58a85676a34a6658a0263b48b85c74799edb807f38}
      - FLASK_ENV=${FLASK_ENV:-development}
      - FLASK_DEBUG=true
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - DATABASE_URL=sqlite:///app/projects/database.db
      - ANALYLIT_VERSION=4.0.0
      - UNPAYWALL_EMAIL=${UNPAYWALL_EMAIL:-alicechabaux@gmail.com}
      - ZOTERO_USER_ID=${ZOTERO_USER_ID:-8926142}
      - ZOTERO_API_KEY=${ZOTERO_API_KEY:-NaqpuvV9xxfJArJRWgYMDlYs}
      - PYTHONPATH=/app
      - USE_GPU=true
      - NVIDIA_VISIBLE_DEVICES=0
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./projects:/app/projects
      - ./web:/app/web:ro
      - .:/app
    # Utilisation de Gunicorn avec GeventWebSocketWorker pour les WebSockets
    command: gunicorn --bind 0.0.0.0:5001 --worker-class geventwebsocket.gunicorn.workers.GeventWebSocketWorker --workers 2 --timeout 120 server_v4_complete:app
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    runtime: nvidia
    deploy:
      resources:
        limits:
          memory: 2g # Réduit à 2GB pour laisser de la marge sur 16GB total
          cpus: '1.0' # Réduit à 1 CPU, suffisant pour l'interface web
        reservations:
          devices:
            - driver: nvidia
              count: 1 # Réserve 1 GPU (le même que Ollama et worker)
              capabilities: [gpu]

  # --- WORKER POUR TÂCHES DE FOND (RQ) ---
  worker:
    build:
      context: .
      dockerfile: Dockerfile-worker-complete
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - DATABASE_URL=sqlite:///app/projects/database.db
      - USE_GPU=true
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=0
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./projects:/app/projects
      - .:/app
    command: python -m rq.cli worker -u redis://redis:6379/0 --with-scheduler analylit_processing_v4 analylit_synthesis_v4 analylit_analysis_v4 analylit_background_v4
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
      base_image_builder:
        condition: service_completed_successfully
    networks:
      - analylit-network
    restart: unless-stopped
    runtime: nvidia
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # --- OLLAMA AVEC SUPPORT GPU NVIDIA ---
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - analylit-network
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        limits:
          memory: 6g # Réduit à 6GB pour laisser de la marge, mais Ollama peut être très gourmand
          cpus: '4.0' # Garde 4 CPUs pour l'inférence LLM
        reservations:
          devices:
            - driver: nvidia
              count: all # Utilise le GPU disponible (votre RTX 2060 SUPER)
              capabilities: [gpu]

  # --- REDIS POUR CACHE ET QUEUES ---
  redis:
    image: redis:7-alpine
    container_name: analylit-redis-v4
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - analylit-network
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 300
      --save 60 1000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 0.5g # Réduit à 0.5GB
          cpus: '0.5'  # Réduit à 0.5 CPU, Redis est très efficace
networks:
  analylit-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  ollama_data:
    driver: local
